"$schema" = 'https://starship.rs/config-schema.json'

# Starship prompt configuration
# Reference: https://starship.rs/config/

add_newline = false
command_timeout = 5000

[character]
success_symbol = "[´âÜ](bold green)"
error_symbol = "[´âÜ](bold red)"

[cmd_duration]
format = " took [$duration]($style) "

[directory]
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 1
truncate_to_repo = false

[aws]
format = 'on [$symbol$profile]($style) [$region]($style dimmed) [$duration]($style dimmed)'
symbol = '´â»  '

[direnv]
disabled = false

[gcloud]
format = 'on [$symbol$account]($style) [$project]($style dimmed)'
symbol = '¯ƒ░ '
[gcloud.project_aliases]
ista-express-development = 'ies-dev'
ista-express-stage = 'ies-stage'
ista-express-prod = 'ies-prod'

[git_branch]
disabled = false

[git_status]
modified = '!'
format = '([\[$all_status$ahead_behind\]]($style dimmed) )'

[gradle]
disabled = true
symbol = '¯ƒ▓ '

[java]
disabled = true
symbol = '¯£© '

[kotlin]
disabled = true
symbol = '¯áø '

[localip]
disabled = false

[status]
disabled = false
symbol = ''
failure_style = 'dimmed red'
