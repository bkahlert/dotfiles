"$schema" = 'https://starship.rs/config-schema.json'
# Reference: https://starship.rs/config/

add_newline = false
command_timeout = 5000

[aws]
format = 'on [$symbol$profile]($style) [$region]($style dimmed) [$duration]($style dimmed)'
symbol = '  '

[azure]
symbol = ' '

[battery]
full_symbol = '󰁹 '
charging_symbol = '󰂄 '
discharging_symbol = '󰂃 '
unknown_symbol = '󰂑 '
empty_symbol = '󰂎 '

[buf]
symbol = ' '

[bun]
symbol = ' '

[c]
symbol = ' '

[character]
success_symbol = '[](bold green)'
error_symbol = '[](bold red)'

[cpp]
symbol = ' '

[cmake]
symbol = ' '

[cobol]
symbol = ' '

[cmd_duration]
format = ' took [$duration]($style) '

[conda]
symbol = ' '

[container]
symbol = ' '

[crystal]
symbol = ' '

[dart]
symbol = ' '

[deno]
symbol = ' '

[direnv]
disabled = false
symbol = ' '

[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
read_only = ' 󰌾'
truncate_to_repo = false
truncation_length = 1

[docker_context]
symbol = ' '

