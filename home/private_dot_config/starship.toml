# Starship prompt configuration
# Reference: https://starship.rs/config/

add_newline = false

format = "$os$directory$all$character"
right_format = "$custom"

[os]
disabled = false
format = "[$symbol]($style) "
style = "white"

[os.symbols]
Macos = "п…№"

[directory]
format = "[пЃ» $path]($style)[$read_only]($read_only_style) "
home_symbol = "пЂ• ~"
truncation_length = 3
truncate_to_repo = false
read_only = " пЃ»"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

[custom.disk]
command = "df -h / | awk 'NR==2 {print $5}'"
when = true
format = "[п‚  $output]($style)"
style = "white"
